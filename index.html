<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bloom Bliss Flower Shop</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #fff0f5;
        }
        header {
            background-color: #ff69b4;
            color: white;
            text-align: center;
            padding: 20px;
        }
        nav {
            background-color: #333;
            text-align: center;
            padding: 10px;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            padding: 20px;
        }
        .products {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
        }
        .product {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 200px;
            text-align: center;
            box-shadow: 0 0 8px rgba(0,0,0,0.1);
        }
        .product img {
            width: 100%;
            border-radius: 10px;
        }
        button {
            background-color: #ff69b4;
            border: none;
            color: white;
            padding: 10px;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background-color: #e0559f;
        }
        footer {
            background-color: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
    </style>
</head>
<body>

<header>
    <h1>🌸 Bloom Bliss Flower Shop</h1>
    <p>Fresh flowers for every occasion</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Shop</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <h2>Our Flowers</h2>
    <div class="products">

        <div class="product">
            <img src="https://via.placeholder.com/300x200?text=Roses" alt="Roses">
            <h3>Red Roses Bouquet</h3>
            <p>$25</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/300x200?text=Tulips" alt="Tulips">
            <h3>Colorful Tulips</h3>
            <p>$18</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <img src="https://via.placeholder.com/300x200?text=Sunflowers" alt="Sunflowers">
            <h3>Sunflower Bundle</h3>
            <p>$20</p>
            <button>Buy Now</button>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 Bloom Bliss Flower Shop</p>
</footer>

</body>
</html>
