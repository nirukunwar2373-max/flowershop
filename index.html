<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Happy Paws Dog Store</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background-color: #f4f4f4;
        }
        header {
            background-color: #ff914d;
            color: white;
            padding: 15px;
            text-align: center;
        }
        nav {
            background: #333;
            padding: 10px;
            text-align: center;
        }
        nav a {
            color: white;
            margin: 10px;
            text-decoration: none;
        }
        nav a:hover {
            text-decoration: underline;
        }
        .container {
            padding: 20px;
        }
        .products {
            display: flex;
            gap: 20px;
            flex-wrap: wrap;
        }
        .product {
            background: white;
            padding: 15px;
            border-radius: 10px;
            width: 200px;
            text-align: center;
            box-shadow: 0 0 5px rgba(0,0,0,0.1);
        }
        .product img {
            width: 100%;
            border-radius: 10px;
        }
        footer {
            background: #333;
            color: white;
            text-align: center;
            padding: 10px;
            margin-top: 20px;
        }
        button {
            background: #ff914d;
            border: none;
            padding: 10px;
            color: white;
            cursor: pointer;
            border-radius: 5px;
        }
        button:hover {
            background: #e6762f;
        }
    </style>
</head>
<body>

<header>
    <h1>🐶 Happy Paws Dog Store</h1>
    <p>Your one-stop shop for dog essentials</p>
</header>

<nav>
    <a href="#">Home</a>
    <a href="#">Products</a>
    <a href="#">Contact</a>
</nav>

<div class="container">
    <h2>Our Products</h2>
    <div class="products">
        
        <div class="product">
            <img src="https://placedog.net/300/200" alt="Dog Food">
            <h3>Premium Dog Food</h3>
            <p>$20</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <img src="https://placedog.net/301/200" alt="Dog Toy">
            <h3>Chew Toy</h3>
            <p>$10</p>
            <button>Buy Now</button>
        </div>

        <div class="product">
            <img src="https://placedog.net/302/200" alt="Dog Bed">
            <h3>Comfort Dog Bed</h3>
            <p>$35</p>
            <button>Buy Now</button>
        </div>

    </div>
</div>

<footer>
    <p>© 2026 Happy Paws Dog Store</p>
</footer>

</body>
</html>
